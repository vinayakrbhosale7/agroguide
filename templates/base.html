<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>AgroGuide</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Roboto+Slab:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      /* BODY */

      body {
        background:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("{% static 'images/farmer.jpg' %}");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;

        font-family: "Poppins", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* NAVBAR */

      .navbar {
        background: linear-gradient(135deg, #1fa34a, #0b7d34);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        position: sticky;
        top: 0;
        z-index: 1000;
        transition: 0.3s;
      }

      /* Scroll effect */
      .navbar.scrolled {
        background: rgba(30, 142, 62, 0.9);
        backdrop-filter: blur(10px);
      }

      /* BRAND */

      .navbar-brand {
        color: white;
        font-weight: bold;
        font-size: 24px;
        font-family: "Roboto Slab", serif;
        transition: 0.3s;
      }

      .navbar-brand:hover {
        transform: scale(1.08) rotate(-1deg);
        color: #ffd700;
      }

      /* NAV LINKS */

      .nav-link {
        position: relative;
        color: white !important;
        margin-left: 20px;
        font-weight: 500;
        transition: 0.3s;
      }

      /* underline animation */
      .nav-link::after {
        content: "";
        position: absolute;
        width: 0%;
        height: 2px;
        left: 0;
        bottom: 0;
        background: #ffd700;
        transition: 0.4s ease;
      }

      .nav-link:hover::after {
        width: 100%;
      }

      /* hover effect */
      .nav-link:hover {
        color: #ffd700 !important;
        transform: translateY(-2px);
      }

      /* BUTTON */

      .btn-light {
        border-radius: 20px;
        font-weight: 500;
        transition: 0.3s;
      }

      .btn-light:hover {
        background: #ffd700;
        color: black !important;
        transform: scale(1.05);
      }

      /* MAIN CONTAINER */

      .main-container {
        background: transparent;
        padding: 25px;
      }

      /* FOOTER */

      .footer {
        background: linear-gradient(135deg, #1fa34a, #0b7d34);
        color: white;
        padding: 15px;
        text-align: center;
        margin-top: auto;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="/">🌱 AgroGuide</a>

        <!-- MOBILE TOGGLE -->
        <button
          class="navbar-toggler bg-light"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/"
                ><i class="fa fa-home"></i> Dashboard</a
              >
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/br/before_recommendation">
                <i class="fa fa-seedling"></i> Recommend
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/his/history">
                <i class="fa fa-history"></i> History
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/about/">
                <i class="fa fa-info-circle"></i> About
              </a>
            </li>

            {% if user.is_authenticated %}

            <li class="nav-item">
              <form action="/accounts/logout/" method="post">
                {% csrf_token %}
                <button
                  type="submit"
                  class="nav-link btn btn-light text-dark ms-2"
                >
                  Logout
                </button>
              </form>
            </li>

            {% else %}

            <li class="nav-item">
              <a
                class="nav-link btn btn-light text-dark ms-2"
                href="/accounts/login/"
              >
                Login
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link btn btn-light text-dark ms-2"
                href="/signup/signup/"
              >
                Sign Up
              </a>
            </li>

            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <!-- CONTENT -->

    <div class="container mt-4 flex-grow-1">
      <div class="main-container">{% block content %} {% endblock %}</div>
    </div>

    <!-- FOOTER -->

    <div class="footer">
      <p>© 2026 AgroGuide | Smart Farming System 🌾</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SCROLL ANIMATION SCRIPT -->
    <script>
      window.addEventListener("scroll", function () {
        let navbar = document.querySelector(".navbar");
        navbar.classList.toggle("scrolled", window.scrollY > 50);
      });
    </script>
  </body>
</html>

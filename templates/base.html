<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>CropWise</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background: url("{% static 'images/farmer.jpg' %}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        font-family: "Noto Serif", serif;
      }

      /* Navbar */

      .navbar {
        background: #1e8e3e;
      }

      .navbar-brand {
        color: white;
        font-weight: bold;
        font-size: 22px;
      }

      .nav-link {
        color: white !important;
        margin-left: 15px;
      }

      .nav-link:hover {
        text-decoration: underline;
      }

      /* Cards */

      .card-box {
        border: none;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
        background: white;
      }

      .card-box:hover {
        transform: translateY(-5px);
      }

      /* Footer */

      .footer {
        margin-top: 50px;
        background: #1e8e3e;
        color: white;
        padding: 15px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="/">🌱 CropWise</a>

        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/">Dashboard</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/recommend/">Get Recommendation</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="/history/">History</a>
            </li>

            {% if user.is_authenticated %}

            <li class="nav-item">
              <form action="/accounts/logout/" method="post">
                {% csrf_token %}
                <button
                  type="submit"
                  class="nav-link btn btn-light text-dark ms-2"
                >
                  Logout
                </button>
              </form>
            </li>

            {% else %}

            <li class="nav-item">
              <a
                class="nav-link btn btn-light text-dark ms-2"
                href="/accounts/login/"
              >
                Login
              </a>
            </li>

            <li class="nav-item">
              <a
                class="nav-link btn btn-light text-dark ms-2"
                href="/signup/signup/"
              >
                Sign Up
              </a>
            </li>

            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <!-- PAGE CONTENT -->

    <div class="container mt-4">{% block content %} {% endblock %}</div>

    <!-- FOOTER -->

    <div class="footer">
      <p>© 2026 CropWise | Smart Farming System 🌾</p>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CropWise</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.navbar{
background:#1e8e3e;
}

.navbar-brand{
color:white;
font-weight:bold;
font-size:22px;
}

.nav-link{
color:white !important;
margin-left:15px;
}

.nav-link:hover{
text-decoration:underline;
}

.dashboard-header{
margin-top:30px;
margin-bottom:30px;
}

.card-box{
border:none;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
transition:0.3s;
}

.card-box:hover{
transform:translateY(-5px);
}

.footer{
margin-top:50px;
background:#1e8e3e;
color:white;
padding:15px;
text-align:center;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="#">🌱 CropWise</a>

<div class="collapse navbar-collapse">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/recommend/">Get Recommendation</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/history/">History</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-light text-dark ms-2" href="/accounts/login/">Login
    
</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- PAGE CONTENT -->

<div class="container">

{% block content %}

{% endblock %}

</div>

<!-- FOOTER -->

<div class="footer">

<p>© 2026 CropWise | Smart Farming System 🌾</p>

</div>

</body>
</html>

{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

<!-- Page Title -->

<div class="text-center mb-5">

<h2 class="fw-bold">Get Crop Recommendation</h2>

<p class="text-muted">
Enter your agricultural parameters below
</p>

</div>


<!-- Recommendation Card -->

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow border-0 p-5">

<form method="post">

{% csrf_token %}

<div class="row">

<!-- Soil Type -->

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">🌱 Soil Type</label>

<select name="soil" class="form-select">

<option>Loamy</option>
<option>Clay</option>
<option>Black</option>

</select>

</div>


<!-- Season -->

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">📅 Season</label>

<select name="season" class="form-select">

<option>Kharif (Monsoon)</option>
<option>Rabi (Winter)</option>

</select>

</div>


<!-- Rainfall -->

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">🌧 Annual Rainfall (mm)</label>

<input type="number"
name="rainfall"
class="form-control"
placeholder="rainfall in mm">

<small class="text-muted">
Enter annual rainfall in millimeters
</small>

</div>


<!-- Temperature -->

<div class="col-md-6 mb-4">

<label class="form-label fw-semibold">
🌡 Average Temperature (°C)
</label>

<input type="number"
name="temperature"
class="form-control"
placeholder="temperature in °C">

<small class="text-muted">
Enter average temperature in Celsius
</small>

</div>

</div>


<!-- Submit Button -->

<div class="mt-3">

<button class="btn btn-success w-100 py-2 fs-5">

🔍 Get Recommendations

</button>

</div>

</form>

</div>

</div>

</div>

</div>

{% endblock %}

{% extends "base.html" %} {% block content %}

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
/>

<style>
  /* MAIN BOX */

  .form-box {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
  }

  /* TITLE */

  .form-title {
    font-weight: 700;
    color: white;
  }

  /* INPUTS */

  .form-control,
  .form-select {
    border-radius: 10px;
    padding: 10px;
    transition: 0.3s;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: #1fa34a;
    box-shadow: 0 0 8px rgba(31, 163, 74, 0.5);
  }

  /* LABEL */

  .form-label {
    font-weight: 600;
  }

  /* BUTTON */

  .submit-btn {
    background: linear-gradient(135deg, #1fa34a, #0b7d34);
    border: none;
    border-radius: 30px;
    font-size: 18px;
    transition: 0.3s;
  }

  .submit-btn:hover {
    background: #ffd700;
    color: black;
    transform: scale(1.05);
  }

  /* ICON FLOAT */

  .title-icon {
    font-size: 45px;
    color: #1fa34a;
    animation: float 2s infinite ease-in-out;
  }

  @keyframes float {
    0% {
      transform: translateY(0px);
    }
    50% {
      transform: translateY(-8px);
    }
    100% {
      transform: translateY(0px);
    }
  }
</style>

<div class="container mt-5">
  <!-- TITLE -->

  <div class="text-center mb-5">
    <div class="title-icon mb-2">
      <i class="fa fa-seedling"></i>
    </div>

    <h2 class="form-title">Get Crop Recommendation</h2>

    <p class="text-white">Enter your agricultural parameters below 🌾</p>
  </div>

  <!-- FORM -->

  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="form-box">
        <form method="post">
          {% csrf_token %}

          <div class="row">
            <!-- Soil -->

            <div class="col-md-6 mb-4">
              <label class="form-label">🌱 Soil Type</label>

              <select name="soil" class="form-select">
                <option>Loamy</option>
                <option>Clay</option>
                <option>Black</option>
                <option>Sandy</option>
                <option>Acidic</option>
                <option>Red</option>
                <option>Laterite</option>
                <option>Alluvial</option>
              </select>
            </div>

            <!-- Season -->

            <div class="col-md-6 mb-4">
              <label class="form-label">📅 Season</label>

              <select name="season" class="form-select">
                <option>Kharif (Monsoon)</option>
                <option>Rabi (Winter)</option>
                <option>Annual</option>
              </select>
            </div>

            <!-- Rain -->

            <div class="col-md-6 mb-4">
              <label class="form-label">🌧 Annual Rainfall (mm)</label>

              <input
                type="number"
                name="rainfall"
                class="form-control"
                placeholder="Enter rainfall in mm"
              />

              <small class="text-muted">
                Enter annual rainfall in millimeters
              </small>
            </div>

            <!-- Temp -->

            <div class="col-md-6 mb-4">
              <label class="form-label">🌡 Average Temperature (°C)</label>

              <input
                type="number"
                name="temperature"
                class="form-control"
                placeholder="Enter temperature in °C"
              />

              <small class="text-muted">
                Enter average temperature in Celsius
              </small>
            </div>
          </div>

          <!-- BUTTON -->

          <button class="btn submit-btn w-100 py-2 mt-3">
            🔍 Get Recommendations
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
